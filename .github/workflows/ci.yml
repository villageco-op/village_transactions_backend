name: Backend CI Pipeline

on:
  pull_request:
    branches: [ main, master ]

jobs:
  backend-ci:
    name: Validate Backend PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linting
        run: pnpm lint

      - name: Check Formatting
        run: pnpm format:check

      - name: Run Typecheck
        run: pnpm typecheck

      - name: Run Tests
        run: pnpm test

  update-openapi:
    needs: backend-ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Generate OpenAPI JSON
        run: pnpm run generate:openapi
      
      - name: Push to Frontend Repo
        uses: dmnemec/copy-file-to-another-repo@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB_API_SPECS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          POSTGRES_IMAGE: ${{ secrets.POSTGRES_IMAGE }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          VILLAGE_CONTACT_EMAIL: ${{ secrets.VILLAGE_CONTACT_EMAIL }}
          VILLAGE_FROM_EMAIL: ${{ secrets.VILLAGE_FROM_EMAIL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        with:
          source_file: 'openapi.json'
          destination_repo: 'villageco-op/api-spec'
          destination_folder: '.'
          user_email: 'bot@villageco-op.com'
          user_name: 'OpenAPI Bot'
          commit_message: 'chore: update openapi specs from backend'
  